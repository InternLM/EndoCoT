<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#080c18"/>
      <stop offset="45%"  stop-color="#0e1225"/>
      <stop offset="100%" stop-color="#130d2e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blobGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <!-- Edge fades: use bg color so edges blend naturally -->
    <linearGradient id="fadeTop" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#090d1a" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#090d1a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#110c28" stop-opacity="0"/>
      <stop offset="100%" stop-color="#110c28" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#080c18" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#080c18" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#130d2e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#130d2e" stop-opacity="0.75"/>
    </linearGradient>
    <clipPath id="bannerClip">
      <rect width="900" height="280" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <rect width="900" height="280" fill="url(#bg)"/>

    <!-- Grid -->
    <g stroke="rgba(100,120,200,0.06)" stroke-width="1">
      <line x1="0" y1="40"  x2="900" y2="40"/>
      <line x1="0" y1="80"  x2="900" y2="80"/>
      <line x1="0" y1="120" x2="900" y2="120"/>
      <line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="200" x2="900" y2="200"/>
      <line x1="0" y1="240" x2="900" y2="240"/>
      <line x1="100" y1="0" x2="100" y2="280"/>
      <line x1="200" y1="0" x2="200" y2="280"/>
      <line x1="300" y1="0" x2="300" y2="280"/>
      <line x1="400" y1="0" x2="400" y2="280"/>
      <line x1="500" y1="0" x2="500" y2="280"/>
      <line x1="600" y1="0" x2="600" y2="280"/>
      <line x1="700" y1="0" x2="700" y2="280"/>
      <line x1="800" y1="0" x2="800" y2="280"/>
    </g>

    <!-- Glow blobs -->
    <ellipse cx="180" cy="120" rx="200" ry="140" fill="rgba(99,74,181,0.18)"  filter="url(#blobGlow)"/>
    <ellipse cx="720" cy="160" rx="160" ry="110" fill="rgba(244,114,182,0.12)" filter="url(#blobGlow)"/>
    <ellipse cx="450" cy="130" rx="280" ry="100" fill="rgba(79,70,229,0.08)"  filter="url(#blobGlow)"/>

    <!-- Diffusion arcs left -->
    <circle cx="120" cy="80" r="55"  fill="none" stroke="rgba(139,92,246,0.2)"  stroke-width="1"/>
    <circle cx="120" cy="80" r="90"  fill="none" stroke="rgba(139,92,246,0.1)"  stroke-width="1"/>
    <circle cx="120" cy="80" r="130" fill="none" stroke="rgba(139,92,246,0.05)" stroke-width="1"/>

    <!-- Diffusion arcs right -->
    <circle cx="780" cy="200" r="45"  fill="none" stroke="rgba(249,168,212,0.2)"  stroke-width="1"/>
    <circle cx="780" cy="200" r="80"  fill="none" stroke="rgba(249,168,212,0.1)"  stroke-width="1"/>
    <circle cx="780" cy="200" r="120" fill="none" stroke="rgba(249,168,212,0.05)" stroke-width="1"/>

    <!-- Noise dots -->
    <g fill="rgba(180,180,255,0.25)">
      <circle cx="60"  cy="30"  r="1"/><circle cx="145" cy="18"  r="1.2"/>
      <circle cx="230" cy="55"  r="0.8"/><circle cx="310" cy="22" r="1"/>
      <circle cx="390" cy="40"  r="1.2"/><circle cx="480" cy="15" r="0.8"/>
      <circle cx="560" cy="38"  r="1"/><circle cx="640" cy="20"  r="1.2"/>
      <circle cx="730" cy="48"  r="0.8"/><circle cx="820" cy="25" r="1"/>
      <circle cx="870" cy="55"  r="1.2"/><circle cx="40"  cy="210" r="1"/>
      <circle cx="110" cy="245" r="1.2"/><circle cx="200" cy="225" r="0.8"/>
      <circle cx="820" cy="240" r="1"/><circle cx="860" cy="210" r="1.2"/>
    </g>

    <!-- Soft edge fades (blend into bg, not harsh black) -->
    <rect x="0"   y="0"   width="900" height="72"  fill="url(#fadeTop)"/>
    <rect x="0"   y="208" width="900" height="72"  fill="url(#fadeBottom)"/>
    <rect x="0"   y="0"   width="110" height="280" fill="url(#fadeLeft)"/>
    <rect x="790" y="0"   width="110" height="280" fill="url(#fadeRight)"/>

    <!-- Title -->
    <text x="266" y="152"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="80" font-weight="700"
          fill="url(#titleGrad)" filter="url(#glow)"
          text-anchor="middle">Endo</text>
    <text x="592" y="152"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="80" font-weight="700"
          fill="url(#accentGrad)" filter="url(#glow)"
          text-anchor="middle">CoT</text>

    <!-- Subtitle -->
    <text x="450" y="198"
          font-family="'Courier New', monospace"
          font-size="12.5" letter-spacing="0.5"
          fill="rgba(203,213,240,0.5)"
          text-anchor="middle">Scaling <tspan fill="rgba(196,181,253,0.85)" font-style="italic">Endogenous</tspan> Chain-of-Thought Reasoning in Diffusion Models</text>

  </g>
</svg>
